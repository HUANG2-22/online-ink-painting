<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>青绿山水 - 规则驱动实时绘制</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="status" class="status">已进入青绿山水画境，开始勾勒山势</div>

  <div class="toolbar">
    <button id="brushBtn" class="active" type="button">画笔</button>
    <button id="eraserBtn" type="button">橡皮</button>
    <button id="clearBtn" type="button">重置画卷</button>
  </div>

  <div class="main-container">
    <div class="panel">
      <h3>线条勾勒（输入）</h3>
      <canvas id="inputCanvas" width="512" height="512"></canvas>
    </div>

    <div class="panel">
      <h3>青绿山水（生成）</h3>
      <canvas id="outputCanvas" width="512" height="512"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
