<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>青绿山水生机 - 实时生成</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toolbar">
        <button id="brushBtn" class="active">毛笔</button>
        <button id="eraserBtn">橡皮</button>
        <button onclick="clearAll()">重置画卷</button>
    </div>
    
    <div class="main-container">
        <div class="panel">
            <h3>素描勾勒 (输入)</h3>
            <canvas id="inputCanvas"></canvas>
        </div>
        
        <div class="panel">
            <h3>青绿山水 (生成)</h3>
            <canvas id="outputCanvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
